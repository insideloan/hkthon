# AppSync GraphQL 스키마 — BACKEND(지원) 소유 / wire 계약 SSOT.
#
# 아키텍처: Amplify(Next.js) → AppSync(GraphQL) → Lambda(orchestrator) →
#           DynamoDB(+Streams) → Bedrock/Transcribe. REST/WebSocket 없음.
# 실시간: 구독은 _emit* 뮤테이션에 @aws_subscribe로 연결, DynamoDB Streams
#         팬아웃(api/stream_fanout.py)이 _emit*를 발화한다.
#
# 형상은 SSOT-3(docs/consult_redesigned-3.html) 정합. MOT/turnFlag canonical은
# 이슈 #28 "계약 정합성 확정" 블록 기준.

# ─────────────────────────────────────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────────────────────────────────────

enum CallState { CREATED DIALING IN_CALL TRANSFER_PENDING ENDED }

enum Polarity { PRO CONS NEUTRAL }

# 턴 레벨 flag 배지 (.flag--risk / .flag--def). null→NEUTRAL.
enum TurnFlag { RISK DEF NEUTRAL }

# MOT (Moment of Truth) — SSOT-3 신규 형상.
enum MotMarkerId { MOT_1 MOT_2 MOT_3 MOT_4 MOT_5 }
enum MotState { SHOW ALERT BLOCKED }
enum MotStage { TRUST OBJECTION COLLATERAL CLOSE }

# 컴플라이언스 상태머신.
enum ComplianceStateEnum { DRAFTING REVIEWING REDACTING REDRAFTING APPROVED }

# ─────────────────────────────────────────────────────────────────────────────
# Core types
# ─────────────────────────────────────────────────────────────────────────────

type Call {
  id: ID!
  customerId: String
  state: CallState
  scenario: String
  fraudSuspected: Boolean
  startedAt: String
  endedAt: String
  agentJoinedAt: String
}

type ExistingLoans { own: Int, other: Int }

type Customer {
  id: ID!
  name: String
  phone: String
  targetProduct: String
  rate: String
  limit: Int
  existingLoans: ExistingLoans
  hasVehicle: Boolean
  creditScore: Int
  scenarioHint: String
}

type Token @aws_iam @aws_api_key {
  text: String!
  polarity: Polarity
  reason: String
}

type Turn {
  seq: Int!
  speaker: String
  text: String
  node: String
  churnAfter: Int
  flag: TurnFlag
  tokens: [Token!]
  audioUrl: String        # 봇 발화 TTS mp3 presigned URL (라이브 모드, bot Turn만). 없으면 null.
}

# call 스냅샷의 analysis (SSOT-3): aiAction/data 폐기, 4필드만.
type Analysis {
  strategyHeadline: String
  rationale: String
  churnRisk: Float
  emotion: String
}

type CallSnapshot {
  call: Call!
  customer: Customer
  analysis: Analysis
  transcript: [Turn!]!
  currentNode: String
}

# MOT — 신규 형상 (markerId/state/stage/turnSeq). 폐기 필드 없음.
type MOT {
  markerId: MotMarkerId!
  state: MotState!
  stage: MotStage!
  turnSeq: Int!
}

# ─────────────────────────────────────────────────────────────────────────────
# Queue
# ─────────────────────────────────────────────────────────────────────────────

type QueueSummary { total: Int!, needsAgent: Int!, fraudSuspected: Int!, inCall: Int! }

type QueueRow {
  callId: ID!
  customerName: String
  subtitle: String          # 나이·신용점수 등 고객 부가정보 (예: "38세·KCB744")
  state: CallState
  stage: String
  churnRisk: Int
  assignee: String
  channel: String
  elapsedSec: Int
  highlight: String        # needs_agent | fraud_suspected | null
}

type QueueResult { summary: QueueSummary!, rows: [QueueRow!]! }

# ─────────────────────────────────────────────────────────────────────────────
# Summary / actions
# ─────────────────────────────────────────────────────────────────────────────

type CallSummaryResult {
  id: ID!
  callId: ID!
  resultType: String
  content: String
  flow: [String!]
  categories: [String!]
  handoffReason: String
  fraudSuspected: Boolean
  strategyHeadline: String
  strategyLead: String
  createdAt: String
  mots: [MOT!]!            # CRM sum-flow 단계에 stage로 매핑
}

type ApproveResult { ok: Boolean!, callId: ID!, productId: ID }
type SendLinkResult { ok: Boolean!, callId: ID!, url: String! }
type DeleteQueueRowResult { ok: Boolean!, callId: ID! }

# ─────────────────────────────────────────────────────────────────────────────
# Subscription payloads (SSOT-3 정합)
# ─────────────────────────────────────────────────────────────────────────────

type TurnPayload @aws_iam @aws_api_key {
  callId: ID!
  seq: Int
  speaker: String
  text: String
  flag: TurnFlag
  tokens: [Token!]
  audioUrl: String        # 봇 발화 TTS mp3 presigned URL (라이브 모드, bot Turn만). 없으면 null.
}

# 카드② DB분석 노드 1건. tone: pos|warn|neg|null(중립).
type DbNode @aws_iam @aws_api_key { label: String!, val: String, tone: String }
input DbNodeInput { label: String!, val: String, tone: String }

# onIndexUpdate: 이탈위험/감정 + (체험 시나리오) DB분석 칩·노드. dbChips/dbNodes는 선택.
type IndexUpdatePayload @aws_iam @aws_api_key { callId: ID!, churnRisk: Int, emotion: String, dbChips: [String!], dbNodes: [DbNode!] }

# SSOT-3 발화분석: 턴 단위 토큰 배열(키워드 강조 + polarity로 risk/def flag 분기).
# tokens는 Turn에 기록되는 churn_tokens와 동일 형상(Token: text/polarity/reason).
type SpeechAnalysisPayload @aws_iam @aws_api_key {
  callId: ID!
  turnSeq: Int
  tokens: [Token!]
}

# 카드① 전략: 헤드라인 + 근거(.stx/.slead). turnSeq로 어느 턴의 전략인지 식별.
type StrategyUpdatePayload @aws_iam @aws_api_key {
  callId: ID!
  turnSeq: Int
  strategyHeadline: String!
  rationale: String!
}

# 컴플라이언스 4규제 체크 1건. flagged: 위반 여부(null=미검토).
type ComplianceCheck @aws_iam @aws_api_key { law: String!, desc: String!, flagged: Boolean }

# 최종 발화 diff 세그먼트: {text}=불변 / {del,ins}=교체 / {ins,added:true}=신규.
type ComplianceFinalSegment @aws_iam @aws_api_key { text: String, del: String, ins: String, added: Boolean }

# 카드③ 컴플라이언스: 가안→4규제 검수→최종 diff (SSOT-3 풍부 형상).
type ComplianceStatePayload @aws_iam @aws_api_key {
  callId: ID!
  phase: ComplianceStateEnum!
  draft: String
  violations: [String!]
  checks: [ComplianceCheck!]
  violatedPolicies: [String!]
  final: [ComplianceFinalSegment!]
}

type MotDetectedPayload @aws_iam @aws_api_key {
  callId: ID!
  markerId: MotMarkerId!
  state: MotState!
  stage: MotStage!
}

type QueueUpdatePayload @aws_iam @aws_api_key { callId: ID!, state: CallState }
type CallEndedPayload @aws_iam @aws_api_key { callId: ID!, resultType: String, endedAt: String }

# ─────────────────────────────────────────────────────────────────────────────
# Query / Mutation / Subscription roots
# ─────────────────────────────────────────────────────────────────────────────

type Query {
  queue(highlightOnly: Boolean): QueueResult!
  call(id: ID!): CallSnapshot!
  mots(callId: ID!): [MOT!]!
  callSummary(id: ID!): CallSummaryResult!
  customer(id: ID!): Customer!
  customers: [Customer!]!
}

type Mutation {
  # 분석 전용 / 발신
  createCall(customerId: ID!): Call!
  dialCall(customerId: ID!): Call!
  # 콜 액션 4종
  approveProduct(callId: ID!, productId: ID!): ApproveResult!
  transferToAgent(callId: ID!): Call!
  sendLink(callId: ID!, url: String!): SendLinkResult!
  endCall(callId: ID!): Call!
  # 큐 row 수동 삭제 (관리자 대시보드)
  deleteQueueRow(callId: ID!): DeleteQueueRowResult!
  # 스크립트 모드 진행
  nextTurn(callId: ID!): Turn
  # 라이브 오디오 (스크립트 모드 no-op)
  startAudio(callId: ID!): Boolean
  audioChunk(callId: ID!, data: String!): Boolean

  # 내부 _emit* — Streams 팬아웃이 호출, 구독이 @aws_subscribe로 연결.
  # NONE 데이터소스 resolver가 arguments를 그대로 payload로 echo(hkthon-stack.ts)하므로,
  # payload 형상 = arguments 형상이어야 한다. 리스트/객체 인자는 input 타입 사용.
  _emitTurn(callId: ID!, seq: Int, speaker: String, text: String, flag: TurnFlag, audioUrl: String, tokens: [TokenInput!]): TurnPayload @aws_iam
  _emitIndexUpdate(callId: ID!, churnRisk: Int, emotion: String, dbChips: [String!], dbNodes: [DbNodeInput!]): IndexUpdatePayload @aws_iam
  _emitSpeechAnalysis(callId: ID!, turnSeq: Int, tokens: [TokenInput!]): SpeechAnalysisPayload @aws_iam
  _emitStrategyUpdate(callId: ID!, turnSeq: Int, strategyHeadline: String!, rationale: String!): StrategyUpdatePayload @aws_iam
  _emitComplianceState(callId: ID!, phase: ComplianceStateEnum!, draft: String, violations: [String!], checks: [ComplianceCheckInput!], violatedPolicies: [String!], final: [ComplianceFinalSegmentInput!]): ComplianceStatePayload @aws_iam
  _emitMot(callId: ID!, markerId: MotMarkerId!, state: MotState!, stage: MotStage!): MotDetectedPayload @aws_iam
  _emitQueueUpdate(callId: ID!, state: CallState): QueueUpdatePayload @aws_iam
  _emitCallEnded(callId: ID!, resultType: String, endedAt: String): CallEndedPayload @aws_iam
}

# _emit* 인자용 input 타입 (output Token/ComplianceCheck는 인자로 못 씀).
input TokenInput { text: String!, polarity: Polarity, reason: String }
input ComplianceCheckInput { law: String!, desc: String!, flagged: Boolean }
input ComplianceFinalSegmentInput { text: String, del: String, ins: String, added: Boolean }

type Subscription {
  onQueueUpdate: QueueUpdatePayload
    @aws_subscribe(mutations: ["_emitQueueUpdate"])
  onTurn(callId: ID!): TurnPayload
    @aws_subscribe(mutations: ["_emitTurn"])
  onIndexUpdate(callId: ID!): IndexUpdatePayload
    @aws_subscribe(mutations: ["_emitIndexUpdate"])
  onSpeechAnalysis(callId: ID!): SpeechAnalysisPayload
    @aws_subscribe(mutations: ["_emitSpeechAnalysis"])
  onStrategyUpdate(callId: ID!): StrategyUpdatePayload
    @aws_subscribe(mutations: ["_emitStrategyUpdate"])
  onComplianceState(callId: ID!): ComplianceStatePayload
    @aws_subscribe(mutations: ["_emitComplianceState"])
  onMotDetected(callId: ID!): MotDetectedPayload
    @aws_subscribe(mutations: ["_emitMot"])
  onCallEnded(callId: ID!): CallEndedPayload
    @aws_subscribe(mutations: ["_emitCallEnded"])
}

schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}
