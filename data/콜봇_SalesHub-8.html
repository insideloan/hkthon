<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 상담 Hub — 콜봇 (Sales Hub Style)</title>
<style>
:root{
  --bg-cream:#FAF6EE; --lav:#ECEAF1; --lav-2:#F0EFF3;
  --card:rgba(255,255,255,.72); --card-solid:#FFFFFF;
  --pill:#ECECF1; --pill-line:rgba(0,0,0,.05); --line:rgba(0,0,0,.07);
  --lime:#E7F46A; --lime-soft:#F0FB9C; --lime-pale:#F5FBCC;
  --teal:#4E9D90; --teal-dk:#3C857A; --pink:#F7DEDD;
  --ink:#27272B; --ink-btn:#19191B; --gray:#8C8C95; --gray-2:#6B6B74;
  --sky:#7FC4F5; --sky-bg:#EAF6FF; --sky-line:#9AD1F7;
  --mint:#8FCB6A; --mint-bg:#E9F7DF; --mint-line:#BFE3A8;
  --ai-bg:#EEF0F2; --ai-line:#D4D8DE;
  --r:18px; --r-sm:12px;
  --shadow:0 1px 2px rgba(20,20,30,.05),0 8px 24px rgba(20,20,30,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
  color:var(--ink);background:var(--lav);-webkit-font-smoothing:antialiased;font-size:12px;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;min-height:620px;overflow:hidden}
.ic{width:16px;height:16px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
.ic-sm{width:14px;height:14px}

/* TOP BAR (제거됨) */

/* BODY 3-PANE */
.body{flex:1;display:flex;min-height:0}
.sidebar{width:150px;flex:none;background:var(--lav);padding:14px 12px;overflow-y:auto}
.menu-head{margin:4px 2px 16px}
.menu-head h1{font-size:18px;font-weight:600;letter-spacing:-.3px;white-space:nowrap}
.nav-label{font-size:10px;letter-spacing:.4px;color:var(--gray);font-weight:600;margin:14px 4px 6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:12px;color:#3a3a40;cursor:pointer;font-size:12px;margin-bottom:3px}
.nav-item:hover{background:rgba(255,255,255,.6)}
.nav-item.active{background:var(--lime);color:#33361a;font-weight:600}
.nav-item .badge{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(0,0,0,.12);color:#55555c;flex:none}
.nav-item.active .badge{border-color:rgba(0,0,0,.2);color:#33361a}

/* DETAIL (gradient bg) */
.detail{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;padding:12px 18px 16px;
  background:
   radial-gradient(120% 80% at 0% 0%, #E9F79A 0%, rgba(233,247,154,0) 42%),
   radial-gradient(115% 80% at 2% 100%, #F8DEDD 0%, rgba(248,222,221,0) 48%),
   linear-gradient(135deg,#F6FAE2 0%, #FAF6EE 48%, #FBEFEF 100%)}

/* contact header */
.contact-head{display:flex;align-items:center;gap:14px;padding:6px 4px 14px;flex:none}
.ch-av{width:52px;height:52px;border-radius:50%;flex:none;display:grid;place-items:center;
  background:linear-gradient(135deg,#e7c9a8,#caa07a);color:#3a2c1c;font-size:13px;font-weight:800;letter-spacing:-.3px;
  border:1px solid rgba(0,0,0,.08);box-shadow:0 2px 6px rgba(120,120,130,.32)}
.ch-pills{display:flex;flex-wrap:wrap;gap:9px}
.info-pill{background:#fff;border:1px solid var(--line);border-radius:11px;padding:7px 14px;font-size:12.5px;
  font-weight:800;color:#33333a;box-shadow:0 2px 6px rgba(120,120,130,.30)}

/* ===== 상담 진행 상태(좌) + 이탈 위험도 게이지(우) ===== */
.risk-row{display:flex;gap:18px;align-items:stretch;margin:0 0 12px;flex:none}

/* 이탈 위험도 게이지 (컴팩트 · 가로형) */
.gauge-card{flex:none;width:212px;background:var(--card-solid);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);padding:8px 14px;display:flex;flex-direction:row;align-items:center;gap:10px;position:relative;transition:box-shadow .4s ease}
.gauge-svg{width:104px;height:61px;display:block;flex:none}
.gauge-read{display:flex;flex-direction:column;line-height:1.1}
.gauge-title{font-size:10px;font-weight:700;color:#8c8c95;letter-spacing:.2px;white-space:nowrap}
.gauge-big{font-size:24px;font-weight:800;color:#2b3340;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.gauge-big i{font-size:14px;font-weight:800;font-style:normal;margin-left:1px}
.gauge-lvl{font-size:11px;font-weight:700;color:#8d9097}
/* 위험도별 정적 하이라이트 (그림자 유지 · 깜빡임 없음) */
.gauge-card.lv-lo{box-shadow:0 0 0 2px rgba(47,191,94,.35),var(--shadow)}
.gauge-card.lv-mid{box-shadow:0 0 0 2px rgba(232,146,43,.42),var(--shadow)}
.gauge-card.lv-hi{box-shadow:0 0 0 3px rgba(226,59,59,.5),var(--shadow)}

/* 상담 진행 상태 */
.status-card{flex:1;min-width:0;background:rgba(255,255,255,.55);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);padding:7px 16px;display:flex;flex-direction:column;justify-content:center;overflow-x:auto}
.status-title{font-size:10px;font-weight:700;color:#8c8c95;letter-spacing:.3px;margin-bottom:5px}
.proc-track{display:flex;align-items:center}
.proc-step{flex:none;display:flex;align-items:center;gap:6px;color:#5a5a62;font-size:10.5px}
.proc-step .ps-label{white-space:nowrap}
.proc-step .chip{width:22px;height:22px;border-radius:50%;background:#fff;border:1px solid var(--line);display:grid;place-items:center;flex:none;color:#9a9aa2}
.proc-step .chip svg{width:11px;height:11px}
.proc-step.active{color:#222;font-weight:700}
.proc-step.active .chip{border-color:var(--teal);color:var(--teal);animation:chipPulse 1.2s ease-in-out infinite}
@keyframes chipPulse{0%,100%{box-shadow:0 0 0 0 rgba(78,157,144,.4)}50%{box-shadow:0 0 0 5px rgba(78,157,144,0)}}
.proc-step.done .chip{background:var(--teal);border-color:var(--teal);color:#fff}
/* 단계 연결선 — 얇은 정적 선 (애니메이션 없음) */
.proc-line{flex:1;min-width:12px;height:1.5px;background:var(--line);margin:0 6px}
.proc-line.done{background:var(--teal)}
.proc-step .chip .spinner{width:12px;height:12px;border-width:2px}
.spinner{width:16px;height:16px;border-radius:50%;border:2px solid #d7d7dc;border-top-color:var(--teal);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* nav controls */
.navrow{display:flex;align-items:center;gap:10px;margin:0 2px 12px;flex:none}
.navbtn{display:flex;align-items:center;gap:6px;background:var(--ink-btn);color:#fff;border-radius:18px;padding:7px 15px;font-size:12px;cursor:pointer;border:0}
.navbtn.ghost{background:#fff;color:#33333a;border:1px solid var(--line)}
.navbtn:disabled{opacity:.35;cursor:default}
.navind{font-size:12px;color:var(--gray-2)}
.navspace{flex:1}
.legend{display:flex;gap:10px;align-items:center;font-size:10.5px;color:var(--gray-2)}
.legend i{width:22px;height:8px;border-radius:4px;display:inline-block;vertical-align:middle;margin-right:4px}
.lg-lo i{background:linear-gradient(90deg,#9ed99e,#43a047)}
.lg-hi i{background:linear-gradient(90deg,#e6a3a3,#c0392b)}

/* stage columns */
.stage-cols{flex:1;display:flex;gap:16px;min-height:0}
.col-box{background:var(--card);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);display:flex;flex-direction:column;min-height:0;overflow:hidden}
.stt-box{flex:0 0 24%;min-width:0}
.ana-box{flex:1;min-width:0}
.box-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 11px;border-bottom:1px solid var(--line);flex:none}
.box-head h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.box-head .sub{font-size:11px;color:var(--gray)}
.box-head .tmr{font-size:12px;font-weight:600;color:var(--teal);font-variant-numeric:tabular-nums}

/* ===== 통화 카드 (통화중 + 통화시간만) ===== */
.call-card{display:flex;flex-direction:column;align-items:center;text-align:center;gap:4px;
  padding:12px 12px 11px;border-bottom:1px solid var(--line);flex:none;
  background:linear-gradient(180deg,rgba(232,238,248,.55),rgba(232,238,248,0))}
.call-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gray);font-weight:600}
.call-status .ldot{width:6px;height:6px;border-radius:50%;background:#43a047;animation:livePulse 1.4s ease infinite}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(67,160,71,.55)}50%{box-shadow:0 0 0 5px rgba(67,160,71,0)}}
.call-tmr{font-size:22px;font-weight:800;color:#27303f;font-variant-numeric:tabular-nums;letter-spacing:.5px}
.stt-cap{display:flex;align-items:center;gap:6px;padding:9px 14px 4px;font-size:11px;font-weight:700;color:#4a4a52;flex:none}
.box-body{flex:1;overflow-y:auto;padding:14px 16px}

/* transcript bubbles */
.tx{display:flex;flex-direction:column;gap:11px}
.sys{align-self:center;background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:14px;
  padding:6px 13px;font-size:11px;color:var(--gray-2)}
.bub{max-width:86%;padding:10px 13px;border-radius:15px;font-size:12.5px;line-height:1.5;border:1px solid var(--line);position:relative}
.bub .who{font-size:10px;color:var(--gray);margin-bottom:3px;font-weight:600}
.bub.cu{align-self:flex-start;background:#fff;border-bottom-left-radius:5px}
.bub.ai{align-self:flex-end;background:#fff;border-bottom-right-radius:5px}
.bub.cu.live{background:var(--mint-bg);border-color:var(--mint-line);font-weight:600;box-shadow:0 0 0 3px rgba(143,203,106,.32);animation:cuPulse 1.3s ease infinite}
@keyframes cuPulse{0%,100%{box-shadow:0 0 0 3px rgba(143,203,106,.30)}50%{box-shadow:0 0 0 7px rgba(143,203,106,.10)}}
.bub.ai.cur{background:var(--ai-bg);border-color:var(--ai-line);font-weight:600;box-shadow:0 0 0 3px rgba(170,176,184,.32)}
.bub.ai.cur.loading{color:#9aa0a8;animation:aiPulse 1.3s ease infinite}
@keyframes aiPulse{0%,100%{box-shadow:0 0 0 3px rgba(170,176,184,.32)}50%{box-shadow:0 0 0 7px rgba(170,176,184,.10)}}
.bub.folded{align-self:stretch;max-width:100%;background:transparent;border:0;border-bottom:1px dashed var(--line);
  border-radius:0;padding:6px 2px 6px 8px;font-size:11px;color:var(--gray-2);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;box-shadow:none;animation:none;font-weight:400}
.bub.folded .who-s{margin-right:6px;opacity:.85}
.bub.folded.cu{border-left:2px solid var(--mint-line)}
.bub.folded.ai{border-left:2px solid var(--ai-line)}
.bub.in{animation:bubIn .4s ease}
@keyframes bubIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.typing{display:inline-flex;gap:4px;align-items:center;padding:2px 0}
.typing i{width:6px;height:6px;border-radius:50%;background:#b6bcc4;animation:tdot 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* fly highlight */
.fly{position:fixed;z-index:9999;border-radius:14px;pointer-events:none;
  transition:transform .7s cubic-bezier(.5,0,.2,1),opacity .7s ease,width .7s ease,height .7s ease}

/* customer analysis strip */
.cuana-wrap{margin-bottom:12px;display:none}
.cuana-wrap.show{display:block;animation:fadeUp .4s ease}
.cuana-t{font-size:11px;font-weight:600;color:#1d5f8f;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.cuana{display:flex;flex-wrap:wrap;gap:6px}
.ct{background:var(--sky-bg);border:1px solid #bfe0fa;color:#1d5f8f;border-radius:8px;padding:4px 9px;font-size:11px}
.ct b{font-weight:700}

/* analysis cards */
.ana-body{display:flex;flex-direction:column;padding:14px 16px;overflow:hidden}
.ana-box.phase-cu{background:radial-gradient(135% 135% at 0% 0%, rgba(143,203,106,.42) 0%, rgba(143,203,106,0) 46%), var(--card)}
.ana-box.phase-ai{background:radial-gradient(135% 135% at 0% 0%, rgba(170,176,184,.5) 0%, rgba(170,176,184,0) 46%), var(--card)}
.cards-row{display:flex;gap:12px;flex:1;min-height:0}
.acard{flex:1;min-width:0;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.66);overflow:hidden;position:relative;transition:box-shadow .3s,background .3s}
.acard .ah{display:flex;align-items:center;gap:9px;padding:11px 13px}
.acard .anum{width:24px;height:24px;border-radius:50%;background:#fff;border:1px solid var(--line);display:grid;place-items:center;font-weight:700;font-size:12px;color:#7a7a82;flex:none}
.acard .at{font-size:13px;font-weight:600}
.acard .ah .ah-ic{margin-left:auto;color:var(--gray);display:grid;place-items:center}
.acard .ab{padding:0 13px 13px;font-size:12px;color:var(--gray-2);line-height:1.55;display:none;overflow-y:auto;flex:1}
.acard.revealed .ab{display:block;animation:fadeUp .4s ease}
.acard.activating{box-shadow:0 9px 28px rgba(78,157,144,.5),0 0 0 2px rgba(78,157,144,.55);animation:cardBlink .7s ease infinite}
@keyframes cardBlink{0%,100%{box-shadow:0 11px 32px rgba(78,157,144,.55),0 0 0 2px rgba(78,157,144,.6)}50%{box-shadow:0 4px 13px rgba(78,157,144,.16),0 0 0 2px rgba(78,157,144,.16)}}
.acard.done .anum{background:var(--teal);color:#fff;border-color:var(--teal)}
.acard.done{background:rgba(255,255,255,.86)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.tbls{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 8px}
.tbl{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-size:11px;color:#4a4a52}
.tbl svg{width:13px;height:13px;color:var(--teal)}
.orch{font-size:10.5px;color:var(--gray);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.orch .spin2{width:11px;height:11px;border-radius:50%;border:2px solid #dcdce2;border-top-color:var(--teal);animation:spin 1s linear infinite}
.drow{display:flex;justify-content:space-between;gap:8px;font-size:11.5px;padding:3px 0;border-bottom:1px dashed var(--line)}
.drow:last-child{border:0}.drow b{color:var(--ink);font-weight:600}
.note{background:var(--lime-pale);border-radius:8px;padding:7px 10px;font-size:11px;color:#4a4a30;margin-top:8px}
.concl{background:var(--ink-btn);color:#fff;border-radius:12px;padding:11px 13px;font-size:12.5px;line-height:1.5;margin-top:2px}
.concl .cl{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:3px;letter-spacing:.5px}

/* === 카드 시각화 (멀리서도 한눈에) === */
/* 카드1: 조회 소스 칩 + KPI 타일 */
.vsrcs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.vsrc{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--line);border-radius:7px;padding:4px 8px;font-size:10px;color:#5a5a62;font-weight:600;white-space:nowrap}
.vsrc svg{width:12px;height:12px;color:var(--teal)}
.vkpis{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.vkpi{background:#fff;border:1px solid var(--line);border-left:4px solid #c2c2c9;border-radius:9px;padding:7px 10px}
.vkpi .vk-l{font-size:9.5px;color:var(--gray);font-weight:700;letter-spacing:.2px;margin-bottom:2px;line-height:1.2}
.vkpi .vk-v{font-size:15px;font-weight:800;color:var(--ink);line-height:1.25;letter-spacing:-.3px}
.vkpi.num{border-left-color:var(--teal)}
.vkpi.ok{border-left-color:#43a047;background:#f3faf3}.vkpi.ok .vk-v{color:#2e7d33}
.vkpi.warn{border-left-color:#c0392b;background:#fdf4f3}.vkpi.warn .vk-v{color:#b23b32}
.vnote{background:var(--lime-pale);border-radius:8px;padding:6px 9px;font-size:10.5px;color:#4a4a30;line-height:1.45}

/* 카드2: 전략 플로우 */
.vflow{display:flex;flex-wrap:wrap;align-items:center;gap:5px}
.vflow-step{background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:12.5px;font-weight:700;color:#33333a;line-height:1.3}
.vflow-step.goal{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 5px 14px rgba(78,157,144,.32)}
.vflow-arr{color:var(--teal);font-weight:900;font-size:14px}

/* 카드3: Next Action (1·2번 카드 하단 텍스트 모음) */
.na{display:flex;flex-direction:column;gap:9px}
.na-block{border:1px solid var(--line);border-left:4px solid var(--teal);border-radius:10px;padding:9px 12px;background:#fff}
.na-block.na-strat{border-left-color:var(--teal);background:#f3faf8}
.na-block.na-evi{border-left-color:#7FC4F5;background:#f4fbff}
.na-lab{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:.3px;color:#5a5a62;margin-bottom:5px}
.na-block.na-strat .na-lab{color:var(--teal-dk)}
.na-block.na-evi .na-lab{color:#1d6fa8}
.na-lab svg{width:12px;height:12px}
.na-txt{font-size:12px;color:#33333a;line-height:1.55;font-weight:600}

/* summary view */
.summary{flex:1;display:none;min-height:0;overflow-y:auto;padding-right:2px}
.summary.show{display:block}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.spanel{background:var(--card);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.spanel h3{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;gap:7px;align-items:center}
.srow{display:flex;justify-content:space-between;gap:8px;font-size:12px;padding:4px 0;border-bottom:1px dashed var(--line)}
.srow:last-child{border:0}.srow b{font-weight:600;color:var(--ink)}
.stags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.stag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:9px;background:#fff;border:1px solid var(--line);color:#4a4a52}
.stag.warn{background:var(--pink);border-color:#e9b7b6;color:#9c3a38}
.stag.ok{background:#e8f5e9;border-color:#a5d6a7;color:#2e6b30}
.act-item{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--line)}
.act-item:last-child{border:0}
.act-n{width:20px;height:20px;border-radius:50%;background:var(--teal);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;flex:none;margin-top:1px}
.act-n.warn{background:#c0392b}
.act-name{font-weight:600;font-size:12px}
.act-do{font-size:11px;color:#3a5a3a;margin-top:2px;line-height:1.4}
.act-why{font-size:10.5px;color:#7a7060;margin-top:2px;line-height:1.4}
.flow{display:flex;align-items:flex-end;gap:5px;height:54px;margin:6px 0}
.fcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.fbarw{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
.fbar{width:66%;border-radius:4px 4px 0 0}
.fx{font-size:8px;font-weight:700;margin-top:3px}
.memo{font-size:11.5px;line-height:1.6;padding:3px 0;display:flex;gap:6px}
.memo .mk{color:var(--teal-dk);font-weight:700;flex:none}
.mscript{margin-top:8px;background:#fff;border:1px dashed #b9c9bf;border-radius:10px;padding:9px 11px;font-size:11.5px;color:#2c4a3c;line-height:1.5}
</style>
</head>
<body>

/* ===== 이탈 위험도 게이지 ===== */
let gaugeVal=0, gaugeRAF=null;
function gaugePoint(v){const t=Math.PI*(1-v/100);return [60+48*Math.cos(t), 60-48*Math.sin(t)];}
function zoneColor(v){return v>=50?'#e23b3b':v>=30?'#e8922b':'#2fbf5e';}
function zoneLabel(v){return v>=50?'위험':v>=30?'주의':'안정';}
function animateGauge(to){
  if(gaugeRAF)cancelAnimationFrame(gaugeRAF);
  const from=gaugeVal, dur=950, t0=performance.now();
  const lbl=$('gLabel'); lbl.textContent=zoneLabel(to); lbl.style.color=zoneColor(to);
  function frame(now){
    let p=Math.min(1,(now-t0)/dur); p=1-Math.pow(1-p,3);
    const v=from+(to-from)*p;
    const [mx,my]=gaugePoint(v);
    const mk=$('gMark'); mk.setAttribute('cx',mx.toFixed(1)); mk.setAttribute('cy',my.toFixed(1)); mk.setAttribute('stroke',zoneColor(v));
    $('gFill').setAttribute('stroke-dasharray',Math.max(0,v).toFixed(1)+' 100');
    $('gNumV').textContent=Math.round(v);
    if(p<1){gaugeRAF=requestAnimationFrame(frame);}else{gaugeVal=to;}
  }
  gaugeRAF=requestAnimationFrame(frame);
}
function setGaugeBlink(v){
  const card=$('gaugeCard');
  card.classList.remove('lv-lo','lv-mid','lv-hi');
  card.classList.add(v>=50?'lv-hi':v>=30?'lv-mid':'lv-lo');
}

function buildTrack(){
  const tr=$('procTrack');tr.innerHTML='';
  MACRO.forEach((m,i)=>{
    const d=document.createElement('div');d.className='proc-step';d.id='ps'+i;
    d.innerHTML='<span class="chip"><svg class="ic ic-sm"><use href="#i-lock"/></svg></span><span class="ps-label">'+m+'</span>';
    tr.appendChild(d);
    if(i<MACRO.length-1){
      const ln=document.createElement('div');ln.className='proc-line';ln.id='pl'+i;
      tr.appendChild(ln);
    }
  });
}
function setRisk(churn,active){
  animateGauge(churn);
  setGaugeBlink(churn);
  // track
  const macro=STEP2MACRO[active];
  MACRO.forEach((_,i)=>{
    const el=$('ps'+i);el.className='proc-step';
    const chip=el.querySelector('.chip');
    if(i<macro){el.classList.add('done');chip.innerHTML='<svg class="ic ic-sm"><use href="#i-check"/></svg>';}
    else if(i===macro){el.classList.add('active');chip.innerHTML='<span class="spinner"></span>';}
    else{chip.innerHTML='<svg class="ic ic-sm"><use href="#i-lock"/></svg>';}
  });
  // 연결선: 지난 단계까지만 색칠(정적), 애니메이션 없음
  for(let i=0;i<MACRO.length-1;i++){
    const ln=$('pl'+i);if(!ln)continue;
    ln.classList.toggle('done',i<macro);
  }
}

/* 하이라이트가 박스로 "넘어가는" 애니메이션 */
function fly(fromEl,toEl,kind){
  if(!fromEl||!toEl)return;
  const a=fromEl.getBoundingClientRect(), b=toEl.getBoundingClientRect();
  const f=document.createElement('div');f.className='fly';
  const col=kind==='cu'?'rgba(143,203,106,.55)':'rgba(170,176,184,.6)';
  const glow=kind==='cu'?'rgba(143,203,106,.75)':'rgba(160,165,173,.7)';
  f.style.left=a.left+'px';f.style.top=a.top+'px';
  f.style.width=Math.min(a.width,220)+'px';f.style.height=a.height+'px';
  f.style.background=col;f.style.boxShadow='0 0 0 2px '+glow+',0 8px 26px '+glow;
  f.style.opacity='.9';
  document.body.appendChild(f);
  // reflow then move to target
  f.getBoundingClientRect();
  requestAnimationFrame(()=>{
    f.style.transform='translate('+(b.left-a.left+8)+'px,'+(b.top-a.top+6)+'px)';
    f.style.width='180px';f.style.height='30px';f.style.opacity='0';
  });
  T(()=>{f.remove();
    const head=toEl.querySelector('.box-head')||toEl;
    head.animate?head.animate([{boxShadow:'0 0 0 0 '+glow},{boxShadow:'0 0 0 6px transparent'}],{duration:600}):0;
  },760);
}

function valKind(v){
  if(/✅|채택|성공|양호|가능|확정|극복/.test(v))return 'ok';
  if(/❌|배제|위험|실망|거부|불신|高/.test(v))return 'warn';
  if(/[0-9].*%|→|↑|bp|건|분|만|회/.test(v))return 'num';
  return '';
}
function vizDB(s){
  const chips=s.tables.map(t=>'<span class="vsrc"><svg class="ic ic-sm"><use href="#i-db"/></svg>'+t+'</span>').join('');
  const tiles=s.rows.map(r=>'<div class="vkpi '+valKind(r[1])+'"><div class="vk-l">'+r[0]+'</div><div class="vk-v">'+r[1]+'</div></div>').join('');
  return '<div class="vsrcs">'+chips+'</div><div class="vkpis">'+tiles+'</div>';
}
function genParts(g){return g.split('→').map(x=>x.trim()).filter(Boolean);}
function vizStrategy(s){
  const p=genParts(s.gen);
  const flow=p.map((x,i)=>'<span class="vflow-step'+(i===p.length-1?' goal':'')+'">'+x+'</span>').join('<span class="vflow-arr">→</span>');
  return '<div class="vflow">'+flow+'</div>';
}

function playStep(i){
  clearT();cur=i;
  resetAnalysis();
  const ana=document.querySelector('.ana-box');
  // 트랜스크립트: 지난 발화는 접어서 표시
  $('tx').innerHTML='';
  foldEl(addBubble('ai',GREETING),'ai',GREETING);   // 오프닝 인사(항상 맨 위, 접힘)
  for(let k=0;k<i;k++){
    foldEl(addBubble('cu',STEPS[k].cu),'cu',STEPS[k].cu);
    foldEl(addBubble('ai',STEPS[k].ai),'ai',STEPS[k].ai);
  }
  setRisk(STEPS[i].churn,i);
  updateNav();
  const s=STEPS[i];
  const cuEl=addBubble('cu',s.cu,{live:true});         // 현재 고객 발화(연두 음영·진하게)
  T(()=>{ana.classList.add('phase-cu');fly(cuEl,ana,'cu');},700);  // 음영이 분석창 좌상단으로 넘어감
  T(()=>showCuAna(s),1300);                             // 음성·감정·숨은 의도
  let aiEl;
  T(()=>{                                               // 다음 AI 발화 로딩(회색 음영) + 고객 발화 접기
    foldEl(cuEl,'cu',s.cu);
    aiEl=addBubble('ai','',{cur:true,loading:true});
  },2000);
  T(()=>{ana.classList.remove('phase-cu');ana.classList.add('phase-ai');fly(aiEl,ana,'ai');},2650);
  T(()=>activate(0),3050);                              // ① 전략 수립
  T(()=>reveal(0,vizStrategy(s)),3850);
  T(()=>activate(1),4100);                              // ② DB 조회 (전략 기반)
  T(()=>reveal(1,vizDB(s)),4900);
  T(()=>activate(2),5150);                              // ③ 조합 → 최종 발화 결정
  T(()=>reveal(2,vizGen(s)),5950);
  T(()=>{                                               // 로딩이던 AI 말풍선 채움(회색 음영 유지)
    if(aiEl){aiEl.classList.remove('loading');aiEl.innerHTML='<div class="who">🤖 AI</div>'+s.ai;scrollTx();}
    $('anaSub').textContent='완료';
  },6350);
}

  resetAnalysis();
  $('anaSub').textContent='상담 오프닝 · 고객 응답 대기';
  const g=addBubble('ai','',{cur:true,loading:true});   // 인사말 말풍선 로딩 . . .
  T(()=>{                                                // 인사말 채움
    g.classList.remove('loading');
    g.innerHTML='<div class="who">🤖 AI</div>'+GREETING;
    scrollTx();
  },1400);
  T(()=>playStep(0),3100);                               // → 고객 첫 응답(분석 사이클 시작)
}

/* ============== 시작 (연결 → 인사말 → 1단계) ============== */
buildTrack();
(function(){const b=document.createElement('div');b.className='sys';b.textContent='📞 고객에게 연결 중…';$('tx').appendChild(b);})();
T(()=>{$('tx').innerHTML='';const b=document.createElement('div');b.className='sys';b.textContent='✅ 통화 연결됨 · STT 시작';$('tx').appendChild(b);startTimer();playGreeting();},1400);
</script>
