<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>박서준 고객 세그먼트 결정 흐름</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.31.0/iconfont/tabler-icons.min.css">
<style>
:root{
 --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
 --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
 --color-text-primary:#201f1c;--color-text-secondary:#6b6a64;--color-text-tertiary:#9a988f;
 --color-background-primary:#ffffff;--color-background-secondary:#f5f4ef;
 --color-border-tertiary:rgba(0,0,0,.12);--color-border-secondary:rgba(0,0,0,.2);
 --border-radius-md:8px;--border-radius-lg:12px;
 --accent-teal:#0F6E56;--accent-teal-strong:#085041;--accent-teal-soft:#E1F5EE;--accent-teal-line:#6FBFA6;
 --accent-red:#B4453A;--accent-red-soft:#FAEAE7;--accent-red-line:#D9A59C;
}
@media (prefers-color-scheme:dark){:root{
 --color-text-primary:#ecebe4;--color-text-secondary:#b3b1a8;--color-text-tertiary:#807e76;
 --color-background-primary:#1f1e1b;--color-background-secondary:#2a2925;
 --color-border-tertiary:rgba(255,255,255,.14);--color-border-secondary:rgba(255,255,255,.24);
 --accent-teal:#5DCAA5;--accent-teal-strong:#9FE1CB;--accent-teal-soft:#0c4a3c;--accent-teal-line:#3d8a72;
 --accent-red:#E8897B;--accent-red-soft:#4a2b27;--accent-red-line:#8a5249;
}}
*{box-sizing:border-box}
body{margin:0;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);padding:24px 16px}
.sg-wrap{max-width:720px;margin:0 auto}
svg text{font-family:var(--font-sans)}
.t{font-size:14px;fill:var(--color-text-primary)}
.ts{font-size:12px;fill:var(--color-text-secondary)}
.th{font-size:14px;font-weight:500;fill:var(--color-text-primary)}
.box rect,.box circle{fill:var(--color-background-secondary);stroke:var(--color-border-tertiary)}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}.c-teal .th{fill:#085041}.c-teal .ts{fill:#0F6E56}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A}.c-gray .th{fill:#2C2C2A}.c-gray .ts{fill:#5F5E5A}
@media (prefers-color-scheme:dark){
 .c-teal rect{fill:#085041;stroke:#5DCAA5}.c-teal .th{fill:#9FE1CB}.c-teal .ts{fill:#5DCAA5}
 .c-gray rect{fill:#444441;stroke:#B4B2A9}.c-gray .th{fill:#D3D1C7}.c-gray .ts{fill:#B4B2A9}
}
.sg-counter{display:flex;flex-direction:column;align-items:center;gap:2px;padding:14px 0 6px}
.sg-clbl{font-size:12px;color:var(--color-text-tertiary);letter-spacing:.04em}
.sg-cnum{font-family:var(--font-mono);font-size:30px;font-weight:500;color:var(--color-text-primary);font-variant-numeric:tabular-nums}
.sg-cnum.done{color:#0F6E56}
.cat{opacity:0;transition:opacity .35s ease}.cat.show{opacity:1}
.clu{opacity:0;transform:translateY(10px);transition:opacity .45s ease,transform .45s ease;transform-box:fill-box;transform-origin:center}.clu.show{opacity:1;transform:translateY(0)}
.ln{stroke-dasharray:1;stroke-dashoffset:1;transition:stroke-dashoffset .6s ease}.ln.show{stroke-dashoffset:0}
.seg{opacity:0;transition:opacity .45s ease;transform-box:fill-box;transform-origin:center}.seg.show{opacity:1}.seg.dim{opacity:.38}
.seg.lock{animation:lp .5s ease}@keyframes lp{0%{transform:scale(1)}45%{transform:scale(1.04)}100%{transform:scale(1)}}
.sg-final{opacity:0;transition:opacity .5s ease;margin-top:14px;display:flex;flex-direction:column;gap:10px}.sg-final.show{opacity:1}
.sg-sec{background:var(--color-background-secondary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px}
.sg-tag{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;margin-bottom:8px}
.sg-tag.t1{background:#E1F5EE;color:#0F6E56}.sg-tag.t2{background:#E6F1FB;color:#185FA5}
.sg-h{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.sg-p{font-size:13px;color:var(--color-text-secondary);line-height:1.6}
.sg-strat{display:flex;gap:10px;align-items:flex-start;padding:8px 0}.sg-strat+.sg-strat{border-top:.5px solid var(--color-border-tertiary)}
.sg-strat i{font-size:18px;color:#0F6E56;margin-top:1px;flex-shrink:0}
.sg-strat b{display:block;font-weight:500;font-size:13.5px;color:var(--color-text-primary);margin-bottom:2px}
.sg-strat span{font-size:12.5px;color:var(--color-text-secondary);line-height:1.55}
.strat-card{display:flex;flex-direction:column;gap:0}
.strat-mod{padding:4px 0}
.strat-mod+.strat-mod{margin-top:14px;padding-top:16px;border-top:.5px solid var(--color-border-tertiary)}
.strat-mod-h{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--color-text-primary);margin-bottom:13px}
.strat-mod-h i{font-size:18px;color:var(--accent-teal)}
.rate-row{display:flex;align-items:stretch;gap:9px}
.rate-chip{flex:1;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;padding:11px 6px;border-radius:12px;text-align:center}
.rate-chip.old{background:var(--accent-red-soft);border:.5px solid var(--accent-red-line)}
.rate-chip.new{background:var(--accent-teal-soft);border:.5px solid var(--accent-teal-line)}
.rate-lbl{font-size:11px;line-height:1.2}
.rate-chip.old .rate-lbl{color:var(--accent-red)}
.rate-chip.new .rate-lbl{color:var(--accent-teal)}
.rate-num{font-family:var(--font-mono);font-size:29px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1}
.rate-chip.old .rate-num{color:var(--accent-red)}
.rate-chip.new .rate-num{color:var(--accent-teal)}
.rate-num i{font-size:15px;font-style:normal;font-weight:500;margin-left:1px}
.rate-arrow{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;flex-shrink:0}
.rate-arrow i{font-size:20px;color:var(--color-text-tertiary)}
.rate-delta{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--accent-teal);background:var(--accent-teal-soft);padding:1px 7px;border-radius:10px;white-space:nowrap}
.strat-result{display:flex;align-items:center;gap:6px;margin-top:11px;font-size:13px;color:var(--color-text-secondary)}
.strat-result i{font-size:17px;color:var(--accent-teal);flex-shrink:0}
.strat-result b{color:var(--color-text-primary);font-weight:600}
.flow-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.flow-chip{border-radius:10px;font-weight:600;white-space:nowrap}
.flow-chip.muted{font-size:13px;padding:7px 13px;color:var(--color-text-tertiary);background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);text-decoration:line-through}
.flow-chip.strong{font-size:16.5px;padding:8px 15px;color:var(--accent-teal-strong);background:var(--accent-teal-soft);border:1px solid var(--accent-teal-line)}
.flow-ar{font-size:18px;color:var(--color-text-tertiary)}
.flow-sub{font-size:12.5px;color:var(--color-text-secondary);margin-top:11px;line-height:1.55}
.flow-sub b{color:var(--color-text-primary);font-weight:600}
.flow-sub b.hi{color:var(--accent-teal)}
.sg-btn{display:block;margin:10px auto 0;font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:6px 14px;cursor:pointer}
</style>
</head>

<script>
(function(){
const combo=document.getElementById('combo');let timers=[];
function clearT(){timers.forEach(t=>clearTimeout(t));timers=[];}
function at(ms,fn){timers.push(setTimeout(fn,ms));}
let raf;
function count(to,dur){cancelAnimationFrame(raf);const from=parseInt(combo.textContent.replace(/[^0-9]/g,''))||0;const t0=performance.now();function step(t){const k=Math.min(1,(t-t0)/dur);const e=k*k*(3-2*k);combo.textContent=Math.round(from+(to-from)*e).toLocaleString();if(k<1)raf=requestAnimationFrame(step);}raf=requestAnimationFrame(step);}
function showLn(c){document.querySelectorAll('.'+c).forEach(e=>e.classList.add('show'));}
function showClu(c){document.querySelector('.clu[data-c="'+c+'"]').classList.add('show');}
function reset(){clearT();cancelAnimationFrame(raf);combo.textContent='16,777,216';combo.classList.remove('done');document.querySelectorAll('.cat,.clu,.ln,.seg').forEach(e=>e.classList.remove('show','dim','lock'));document.getElementById('final').classList.remove('show');}
function play(){reset();
 for(let i=0;i<9;i++){at(120+i*65,()=>document.querySelector('.cat[data-i="'+i+'"]').classList.add('show'));}
 at(900,()=>{showLn('ln-A');showClu('A');count(262144,1000);});
 at(2050,()=>{showLn('ln-B');showClu('B');count(4096,1000);});
 at(3200,()=>{showLn('ln-C');showClu('C');count(64,1000);});
 at(4350,()=>{showLn('ln-D');showClu('D');count(4,1000);});
 at(5500,()=>{showLn('ln-cv');showClu('cv');});
 at(6100,()=>{document.querySelectorAll('.seg').forEach(e=>e.classList.add('show'));showLn('ln-sg');count(3,800);});
 at(7050,()=>{document.querySelector('.seg[data-s="top"]').classList.add('dim');document.querySelector('.seg[data-s="bottom"]').classList.add('dim');document.querySelector('.seg[data-s="sel"]').classList.add('lock');count(1,800);combo.classList.add('done');});

}
window.sgPlay=play;
if(matchMedia('(prefers-reduced-motion: reduce)').matches){document.querySelectorAll('.cat,.clu,.ln,.seg').forEach(e=>e.classList.add('show'));document.querySelector('.seg[data-s="top"]').classList.add('dim');document.querySelector('.seg[data-s="bottom"]').classList.add('dim');combo.textContent='1';combo.classList.add('done');document.getElementById('final').classList.add('show');}else{at(300,play);}
